<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercices Dynamiques - Les Puissances</title>
    <style>
        :root {
            --primary: #3498db;
            --secondary: #2bc0e4;
            --success: #2ecc71;
            --dark: #2c3e50;
            --light: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
            color: var(--dark);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 650px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: var(--dark);
            margin-bottom: 5px;
            font-size: 24px;
        }

        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .exercise-card {
            background: var(--light);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            color: white;
            margin-bottom: 15px;
        }

        .badge.easy { background-color: #2ecc71; }
        .badge.medium { background-color: #f39c12; }
        .badge.hard { background-color: #e74c3c; }

        .question-item {
            margin-bottom: 20px;
        }

        .question-text {
            font-weight: 600;
            margin-bottom: 8px;
        }

        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #bdc3c7;
            border-radius: 6px;
            resize: vertical;
            font-family: inherit;
            box-sizing: border-box;
        }

        .actions {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .btn-validate { background-color: var(--success); color: white; }
        .btn-refresh { background-color: var(--primary); color: white; }

        .solution-box {
            display: none;
            background-color: #e8f8f5;
            border-left: 5px solid var(--success);
            padding: 15px;
            margin-top: 20px;
            border-radius: 0 8px 8px 0;
            font-size: 14px;
            line-height: 1.6;
        }

        .solution-box.visible { display: block; }
        
        /* Style pour les formules mathématiques sans syntaxe brute */
        .math-expr {
            font-family: 'Times New Roman', Times, serif;
            font-style: italic;
            font-size: 1.1em;
        }
        sup {
            font-family: inherit;
            font-size: 0.8em;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Fiche d'Automatismes : Les Puissances</h1>
    <div class="subtitle">Générateur dynamique d'exercices personnalisés</div>
    
    <div class="exercise-card">
        <span class="badge medium">Niveau : Entraînement</span>
        
        <div class="questions-list">
            <!-- Question 1 -->
            <div class="question-item">
                <div class="question-text" id="q1-text"></div>
                <textarea rows="2" placeholder="Votre réponse..."></textarea>
                <div class="solution-box" id="q1-sol"></div>
            </div>
            
            <!-- Question 2 -->
            <div class="question-item">
                <div class="question-text" id="q2-text"></div>
                <textarea rows="2" placeholder="Votre réponse..."></textarea>
                <div class="solution-box" id="q2-sol"></div>
            </div>

            <!-- Question 3 -->
            <div class="question-item">
                <div class="question-text" id="q3-text"></div>
                <textarea rows="2" placeholder="Votre réponse..."></textarea>
                <div class="solution-box" id="q3-sol"></div>
            </div>
        </div>
    </div>

    <div class="actions">
        <button class="btn-refresh" onclick="window.location.reload()">Nouvelles valeurs</button>
        <button class="btn-validate" onclick="showSolutions()">Valider / Correction</button>
    </div>
</div>

<script>
    function getRandomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }
    function getRandomChoice(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    // --- QUESTION 1 : Calcul simple et écriture décimale ---
    // Utilisation d'entiers à deux chiffres pour la variété si la base est simple, ou petites bases
    const base1 = getRandomChoice([2, 3, 4, 5, 10]);
    const exp1 = (base1 === 10) ? getRandomInt(3, 6) : getRandomInt(2, 4);
    const result1 = Math.pow(base1, exp1);
    
    document.getElementById('q1-text').innerHTML = `1. Donnez l'écriture décimale (ou entière) du nombre suivant : <span class="math-expr">${base1}<sup>${exp1}</sup></span>.`;
    
    let detail1 = "";
    if (base1 === 10) {
        detail1 = `1 suivi de ${exp1} zéros`;
    } else {
        detail1 = Array(exp1).fill(base1).join(" × ");
    }
    document.getElementById('q1-sol').innerHTML = `<strong>Correction :</strong><br><span class="math-expr">${base1}<sup>${exp1}</sup></span> signifie que l'on multiplie la base par elle-même ${exp1} fois.<br>Calcul : ${detail1} = <b>${result1}</b>.`;

    // --- QUESTION 2 : Puissances négatives ---
    const base2 = getRandomChoice([2, 4, 5, 10]);
    const exp2 = (base2 === 10) ? getRandomInt(1, 4) : getRandomChoice([1, 2]);
    
    document.getElementById('q2-text').innerHTML = `2. Écrivez sous forme de fraction, puis sous forme décimale le nombre : <span class="math-expr">${base2}<sup>-${exp2}</sup></span>.`;
    
    let frac2 = `1 / ${base2}<sup>${exp2}</sup>`;
    let denom2 = Math.pow(base2, exp2);
    let dec2 = (1 / denom2).toString().replace('.', ',');
    
    document.getElementById('q2-sol').innerHTML = `<strong>Correction :</strong><br>Une puissance négative est l'inverse de la puissance positive.<br><span class="math-expr">${base2}<sup>-${exp2}</sup></span> = 1 / <span class="math-expr">${base2}<sup>${exp2}</sup></span> = 1 / ${denom2} = <b>${dec2}</b>.`;

    // --- QUESTION 3 : Règle de calcul (Produit) ---
    const base3 = getRandomInt(11, 19); // Utilisation stricte d'entiers à deux chiffres
    const eA = getRandomInt(2, 7);
    const eB = getRandomInt(2, 7);
    const totalExp = eA + eB;

    document.getElementById('q3-text').innerHTML = `3. Écrivez le produit suivant sous la forme d'une seule puissance de ${base3} : <br><span class="math-expr">${base3}<sup>${eA}</sup> × ${base3}<sup>${eB}</sup></span>.`;
    
    document.getElementById('q3-sol').innerHTML = `<strong>Correction :</strong><br>Propriété : Pour multiplier deux puissances d'un même nombre, on additionne leurs exposants.<br>Formule : <span class="math-expr">a<sup>n</sup> × a<sup>m</sup> = a<sup>n + m</sup></span>.<br>Calcul : <span class="math-expr">${base3}<sup>${eA} + ${eB}</sup></span> = <b><span class="math-expr">${base3}<sup>${totalExp}</sup></span></b>.`;

    // --- GESTION DES SOLUTIONS ---
    function showSolutions() {
        const boxes = document.querySelectorAll('.solution-box');
        boxes.forEach(box => box.classList.add('visible'));
    }
</script>

</body>
</html>
