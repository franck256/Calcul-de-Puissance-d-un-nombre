<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercices : Propriétés des Puissances</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #2c3e50;
            max-width: 850px;
            margin: 40px auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            background: white;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            border-bottom: 4px solid #3498db;
            padding-bottom: 15px;
            margin-top: 0;
            font-size: 2.2em;
        }
        .step-panel {
            display: none;
        }
        .step-panel.active {
            display: block;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 15px;
            font-size: 1.2em;
        }
        input[type="text"] {
            border: 3px solid #bdc3c7;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            border-color: #3498db;
        }
        
        .consigne {
            font-size: 1.5em;
            font-weight: 600;
            color: #34495e;
            margin-bottom: 25px;
            text-align: center;
            line-height: 1.4;
        }
        
        /* ZONE DE L'ÉNONCÉ : Ultra-lisible et géante */
        .expression-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 35px 0;
            font-size: 4.5em; /* Écrit en très grand */
            font-weight: bold;
            background: #f8fafc;
            padding: 30px;
            border-radius: 12px;
            border: 2px dashed #cbd5e1;
            color: #1e293b;
            letter-spacing: 5px; /* Espace les symboles */
        }
        
        /* Style des exposants dans l'énoncé et le bilan */
        .expression-container sup, table.bilan sup {
            font-size: 0.6em; /* Proportionnel mais bien visible */
            color: #2563eb;   /* Couleur bleue pour bien détacher l'exposant */
            vertical-align: super;
            margin-left: 2px;
        }
        
        /* ZONE DE RÉPONSE DE L'ÉLÈVE */
        .answer-zone {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 5px;
            margin: 40px 0;
        }
        .input-base {
            width: 180px;
            height: 80px;
            font-size: 2.5em !important;
            font-weight: bold;
            text-align: center;
            border-width: 3px !important;
        }
        .input-exponent {
            width: 80px;
            height: 55px;
            font-size: 1.6em !important;
            font-weight: bold;
            text-align: center;
            color: #2563eb;
            border-color: #2563eb !important;
            border-width: 3px !important;
            margin-top: -20px; /* Décale la case vers le haut pour simuler visuellement un exposant */
        }
        
        /* Boutons d'action */
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        button.action-btn {
            flex: 1;
            padding: 16px;
            font-size: 1.2em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-start { background-color: #3498db; color: white; width: 100%; padding: 16px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.2em;}
        .btn-start:hover { background-color: #2980b9; }
        .btn-submit { background-color: #2ecc71; color: white; }
        .btn-submit:hover { background-color: #27ae60; }
        .btn-skip { background-color: #94a3b8; color: white; }
        .btn-skip:hover { background-color: #64748b; }
        
        /* Progression */
        .progress-bar {
            background-color: #e2e8f0;
            border-radius: 6px;
            height: 12px;
            margin: 25px 0;
            overflow: hidden;
        }
        .progress-fill {
            background-color: #3498db;
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }
        .indicator {
            text-align: right;
            font-size: 1.1em;
            color: #64748b;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .result-box {
            background: #f8fafc;
            padding: 25px;
            border-radius: 8px;
            border-left: 6px solid #3498db;
            margin-top: 20px;
            font-size: 1.2em;
        }
        
        /* Tableau final */
        table.bilan {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 1.1em;
        }
        table.bilan th, table.bilan td {
            border: 1px solid #cbd5e1;
            padding: 14px;
            text-align: left;
        }
        table.bilan th {
            background-color: #f1f5f9;
            color: #1e293b;
        }
        .row-correct { background-color: #dcfce7; color: #14532d; }
        .row-incorrect { background-color: #fee2e2; color: #7f1d1d; }
        .badge {
            display: inline-block;
            padding: 6px 12px;
            font-weight: bold;
            border-radius: 6px;
            font-size: 0.9em;
        }
        .badge-success { background-color: #2ecc71; color: white; }
        .badge-danger { background-color: #e74c3c; color: white; }
        .helper-text {
            font-size: 1.1em;
            color: #64748b;
            margin-bottom: 20px;
            text-align: center;
            display: block;
        }
    </style>
</head>
<body>

    <h1>Entraînement : Propriétés des Puissances</h1>

    <!-- ÉTAPE 1 : Inscription -->
    <div id="panel-login" class="step-panel active">
        <label for="student-name">Prénom et Nom de l'élève :</label>
        <div style="margin-bottom: 20px;">
            <input type="text" id="student-name" style="width:100%; height:50px; font-size:1.2em; padding:10px; box-sizing:border-box;" placeholder="Ex: Lucas Simon">
        </div>
        <button class="btn-start" onclick="startTest()">Commencer le test (10 questions)</button>
    </div>

    <!-- ÉTAPE 2 : Exercices -->
    <div id="panel-quiz" class="step-panel">
        <div class="indicator">Question <span id="current-q">1</span> / 10</div>
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        
        <div class="consigne" id="q-consigne">...</div>
        
        <!-- Énoncé géant -->
        <div class="expression-container" id="q-expression-container"></div>
        
        <span class="helper-text">💡 Laisse la petite case d'exposant vide si ton résultat n'en a pas.</span>
        
        <!-- Zone de saisie XXL simplifiée -->
        <div class="answer-zone">
            <!-- Case Nombre (Base) -->
            <input type="text" id="ans-base" class="input-base" placeholder="Nombre" autocomplete="off">
            <!-- Case Exposant décalée en haut -->
            <input type="text" id="ans-exp" class="input-exponent" placeholder="Exp" autocomplete="off">
        </div>
        
        <div class="btn-group">
            <button class="action-btn btn-skip" onclick="skipQuestion()">Passer la question</button>
            <button class="action-btn btn-submit" onclick="submitAnswer()">Valider la réponse</button>
        </div>
    </div>

    <!-- ÉTAPE 3 : Bilan -->
    <div id="panel-results" class="step-panel">
        <div class="result-box">
            <h2>Résultats de la séance</h2>
            <p><strong>Élève :</strong> <span id="res-name">...</span></p>
            <p><strong>Note :</strong> <span id="res-grade" style="font-size: 2.5em; color: #27ae60; font-weight: bold;">0 / 10</span></p>
        </div>

        <h3 style="margin-top:30px; color:#2c3e50; border-bottom:3px solid #cbd5e1; padding-bottom:8px; font-size:1.4em;">Correction détaillée</h3>
        <table class="bilan">
            <thead>
                <tr>
                    <th>Type d'exercice</th>
                    <th>Énoncé</th>
                    <th>Ta réponse</th>
                    <th>Correction</th>
                </tr>
            </thead>
            <tbody id="bilan-table-body">
            </tbody>
        </table>

        <button class="btn-start" style="margin-top: 40px;" onclick="location.reload()">Refaire un autre test</button>
    </div>

    <script>
        let quizQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let studentName = "";

        function clean(str) {
            return str.trim().replace(/\s+/g, '').replace('.', ',');
        }

        function buildQuiz() {
            quizQuestions = [];
            
            const generators = [
                // 1. Écrire sous la forme a^n
                () => {
                    const pairs = [ {b: 2, e: 3, v: 8}, {b: 2, e: 4, v: 16}, {b: 3, e: 2, v: 9}, {b: 3, e: 3, v: 27}, {b: 5, e: 2, v: 25}, {b: 10, e: 3, v: 1000} ];
                    const p = pairs[Math.floor(Math.random() * pairs.length)];
                    return {
                        type: "Forme aⁿ",
                        consigne: `Écris ce nombre sous la forme d'une puissance de ${p.b} :`,
                        htmlContent: `${p.v}`,
                        check: (b, e) => clean(b) === p.b.toString() && clean(e) === p.e.toString(),
                        correctDisplay: `${p.b}<sup>${p.e}</sup>`
                    };
                },
                // 2. Somme de puissances
                () => {
                    const b1 = [2, 3, 5][Math.floor(Math.random() * 3)];
                    const b2 = [2, 4, 10][Math.floor(Math.random() * 3)];
                    const val1 = Math.pow(b1, 2);
                    const val2 = b2 === 2 ? 8 : Math.pow(b2, 2);
                    const exp2 = b2 === 2 ? 3 : 2;
                    const exact = val1 + val2;
                    return {
                        type: "Somme de puissances",
                        consigne: "Calcule la valeur numérique totale (nombre entier) :",
                        htmlContent: `${b1}<sup>2</sup> + ${b2}<sup>${exp2}</sup>`,
                        check: (b, e) => clean(b) === exact.toString() && clean(e) === "",
                        correctDisplay: exact.toString()
                    };
                },
                // 3. Produit de puissances (En ligne)
                () => {
                    const base = [2, 3, 5, 10][Math.floor(Math.random() * 4)];
                    const e1 = Math.floor(Math.random() * 3 + 2);
                    const e2 = Math.floor(Math.random() * 3 + 2);
                    const totalExp = e1 + e2;
                    return {
                        type: "Produit de puissances",
                        consigne: `Simplifie sous la forme d'une seule puissance de ${base} :`,
                        htmlContent: `${base}<sup>${e1}</sup> × ${base}<sup>${e2}</sup>`,
                        check: (b, e) => clean(b) === base.toString() && clean(e) === totalExp.toString(),
                        correctDisplay: `${base}<sup>${totalExp}</sup>`
                    };
                },
                // 4. Quotient de puissances (En ligne)
                () => {
                    const base = [2, 3, 7, 10][Math.floor(Math.random() * 4)];
                    const e2 = Math.floor(Math.random() * 2 + 2); 
                    const e1 = e2 + Math.floor(Math.random() * 3 + 2); 
                    const diffExp = e1 - e2;
                    return {
                        type: "Quotient de puissances",
                        consigne: `Simplifie sous la forme d'une seule puissance de ${base} :`,
                        htmlContent: `${base}<sup>${e1}</sup> ÷ ${base}<sup>${e2}</sup>`,
                        check: (b, e) => clean(b) === base.toString() && clean(e) === diffExp.toString(),
                        correctDisplay: `${base}<sup>${diffExp}</sup>`
                    };
                },
                // 5. Entier simple
                () => {
                    const base = [2, 3, 4, 5][Math.floor(Math.random() * 4)];
                    const exp = base === 2 ? 4 : 3;
                    const exact = Math.pow(base, exp);
                    return {
                        type: "Calcul simple",
                        consigne: "Calcule la valeur de ce nombre entier :",
                        htmlContent: `${base}<sup>${exp}</sup>`,
                        check: (b, e) => clean(b) === exact.toString() && clean(e) === "",
                        correctDisplay: exact.toString()
                    };
                },
                // 6. Puissance de 10 négative
                () => {
                    const exp = Math.floor(Math.random() * 3 + 1); 
                    let exact = "0,";
                    for(let i = 0; i < exp - 1; i++) exact += "0";
                    exact += "1";
                    return {
                        type: "Puissance de 10 négative",
                        consigne: "Donne l'écriture décimale de ce nombre :",
                        htmlContent: `10<sup>-${exp}</sup>`,
                        check: (b, e) => clean(b).replace('.', ',') === exact && clean(e) === "",
                        correctDisplay: exact
                    };
                }
            ];

            // Mix équilibré de 10 questions
            let pool = [0, 0, 1, 1, 2, 2, 3, 3, 4, 5]; 
            pool = pool.sort(() => 0.5 - Math.random());

            for (let i = 0; i < 10; i++) {
                quizQuestions.push(generators[pool[i]]());
            }
        }

        function startTest() {
            const nameInput = document.getElementById("student-name").value.trim();
            if (nameInput === "") {
                alert("Vaudriez-vous entrer votre nom ?");
                return;
            }
            studentName = nameInput;
            buildQuiz();
            showPanel("panel-quiz");
            loadQuestion();
        }

        function showPanel(panelId) {
            document.querySelectorAll('.step-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(panelId).classList.add('active');
        }

        function loadQuestion() {
            if (currentIndex >= 10) {
                endTest();
                return;
            }

            const q = quizQuestions[currentIndex];
            document.getElementById("current-q").innerText = currentIndex + 1;
            document.getElementById("q-consigne").innerText = q.consigne;
            document.getElementById("q-expression-container").innerHTML = q.htmlContent;
            
            // Remise à zéro des cases géantes
            document.getElementById("ans-base").value = "";
            document.getElementById("ans-exp").value = "";
            document.getElementById("ans-base").focus();
            
            const progress = (currentIndex / 10) * 100;
            document.getElementById("progress-fill").style.width = progress + "%";
        }

        function submitAnswer() {
            const q = quizQuestions[currentIndex];
            const bAns = document.getElementById("ans-base").value;
            const eAns = document.getElementById("ans-exp").value;
            
            if (bAns.trim() === "") {
                alert("N'oublie pas de remplir la case principale.");
                return;
            }

            // Génère un bel affichage mathématique pour la correction finale
            if (eAns.trim() !== "") {
                q.savedDisplay = `${bAns}<sup>${eAns}</sup>`;
            } else {
                q.savedDisplay = `${bAns}`;
            }

            const isCorrect = q.check(bAns, eAns);
            q.isCorrect = isCorrect;
            if (isCorrect) score++;

            currentIndex++;
            loadQuestion();
        }

        function skipQuestion() {
            const q = quizQuestions[currentIndex];
            q.isCorrect = false;
            q.savedDisplay = "<span style='color:#64748b;'>Passée</span>";
            currentIndex++;
            loadQuestion();
        }

        function endTest() {
            showPanel("panel-results");
            document.getElementById("res-name").innerText = studentName;
            document.getElementById("res-grade").innerText = `${score} / 10`;
            
            if (score >= 8) document.getElementById("res-grade").style.color = "#2ecc71";
            else if (score >= 5) document.getElementById("res-grade").style.color = "#e67e22";
            else document.getElementById("res-grade").style.color = "#e74c3c";

            const tableBody = document.getElementById("bilan-table-body");
            tableBody.innerHTML = ""; 

            quizQuestions.forEach(q => {
                const row = document.createElement("tr");
                row.className = q.isCorrect ? "row-correct" : "row-incorrect";

                row.innerHTML = `
                    <td><strong>${q.type}</strong></td>
                    <td style="font-size:1.4em; text-align:center; font-weight:bold;">${q.htmlContent}</td>
                    <td style="font-size:1.4em; text-align:center; font-weight:bold;">${q.savedDisplay}</td>
                    <td style="font-size:1.4em; text-align:center; font-weight:bold;">${q.isCorrect ? '<span class="badge badge-success">Juste !</span>' : q.correctDisplay}</td>
                `;
                tableBody.appendChild(row);
            });
        }

        document.getElementById("ans-base").addEventListener("keyup", function(e) { if (e.key === "Enter") submitAnswer(); });
        document.getElementById("ans-exp").addEventListener("keyup", function(e) { if (e.key === "Enter") submitAnswer(); });
    </script>
</body>
</html>
