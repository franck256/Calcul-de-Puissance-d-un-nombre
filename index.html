<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entraînement : Propriétés des Puissances</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #2c3e50;
            max-width: 800px;
            margin: 40px auto;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            background: white;
        }
        h1 {
            color: #2980b9;
            text-align: center;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
            margin-top: 0;
        }
        .step-panel {
            display: none;
        }
        .step-panel.active {
            display: block;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
        }
        
        /* Conteneur pour simuler un input mathématique riche */
        .math-input-wrapper {
            position: relative;
            background: #fff;
            border: 2px solid #bdc3c7;
            border-radius: 4px;
            padding: 12px;
            min-height: 50px;
            box-sizing: border-box;
            font-size: 1.4em;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
            cursor: text;
        }
        .math-input-wrapper:focus-within {
            border-color: #3498db;
        }
        .math-input-wrapper span.sup-mode {
            color: #e74c3c;
            font-size: 0.7em;
            vertical-align: super;
        }
        .math-input-wrapper:empty::before {
            content: "Cliquez ici pour écrire votre réponse...";
            color: #95a5a6;
            font-size: 0.75em;
            font-weight: normal;
        }
        
        .consigne {
            font-size: 1.2em;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .expression-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 25px 0;
            font-size: 3em;
            font-weight: bold;
            background: #fdfafb;
            padding: 20px;
            border-radius: 8px;
            border: 1px dashed #d5dbdb;
            color: #2c3e50;
            min-height: 80px;
        }
        
        .expression-container sup, table.bilan sup {
            font-size: 0.6em;
            color: #e74c3c;
        }
        
        .keyboard-bar {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .btn-tool {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 1em;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-tool.active {
            background-color: #d35400;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        button.action-btn {
            flex: 1;
            padding: 14px;
            font-size: 1em;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn-start { background-color: #2980b9; color: white; width: 100%; padding: 14px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 1em;}
        .btn-start:hover { background-color: #1f618d; }
        .btn-submit { background-color: #2ecc71; color: white; }
        .btn-submit:hover { background-color: #27ae60; }
        .btn-skip { background-color: #7f8c8d; color: white; }
        .btn-skip:hover { background-color: #6c7a7d; }
        
        .progress-bar {
            background-color: #e0e0e0;
            border-radius: 4px;
            height: 8px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-fill {
            background-color: #3498db;
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }
        .indicator {
            text-align: right;
            font-size: 0.9em;
            color: #7f8c8d;
            margin-bottom: 15px;
        }
        .result-box {
            background: #fdfdfd;
            padding: 20px;
            border-radius: 6px;
            border-left: 5px solid #2980b9;
            margin-top: 20px;
            text-align: center;
        }
        
        table.bilan {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 0.95em;
        }
        table.bilan th, table.bilan td {
            border: 1px solid #dcdde1;
            padding: 10px;
            text-align: left;
        }
        table.bilan th {
            background-color: #f5f6fa;
            color: #353b48;
        }
        .row-correct { background-color: #d4edda; color: #155724; }
        .row-incorrect { background-color: #f8d7da; color: #721c24; }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            font-weight: bold;
            border-radius: 4px;
            font-size: 0.85em;
        }
        .badge-success { background-color: #2ecc71; color: white; }
        .badge-danger { background-color: #e74c3c; color: white; }
        .helper-text {
            font-size: 0.9em;
            color: #7f8c8d;
            margin-bottom: 10px;
            display: block;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>Entraînement : Propriétés et Calculs de Puissances</h1>

    <!-- ÉTAPE 1 : Inscription -->
    <div id="panel-login" class="step-panel active">
        <label for="student-name">Entrez votre nom et votre prénom :</label>
        <div style="margin-bottom: 15px;">
            <input type="text" id="student-name" style="text-align:left;" placeholder="Ex: Lucas Simon">
        </div>
        <button class="btn-start" onclick="startTest()">Commencer la série (10 questions)</button>
    </div>

    <!-- ÉTAPE 2 : Exercices -->
    <div id="panel-quiz" class="step-panel">
        <div class="indicator">Question <span id="current-q">1</span> / 10</div>
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        
        <div class="consigne" id="q-consigne">Calcule ou simplifie l'expression suivante :</div>
        
        <div class="expression-container" id="q-expression-container"></div>
        
        <div>
            <label>Ta réponse :</label>
            <span class="helper-text" id="q-help">Active le bouton Exposant pour écrire en haut.</span>
            
            <!-- Zone d'écriture au format mathématique -->
            <div id="math-input" class="math-input-wrapper" contenteditable="false" tabindex="0"></div>
            
            <div class="keyboard-bar">
                <button type="button" id="btn-exponent" class="btn-tool" onclick="toggleExponentMode()">Écrire l'Exposant (Normal / Exposant)</button>
            </div>
        </div>
        
        <div class="btn-group">
            <button class="action-btn btn-skip" onclick="skipQuestion()">Passer</button>
            <button class="action-btn btn-submit" onclick="submitAnswer()">Valider la réponse</button>
        </div>
    </div>

    <!-- ÉTAPE 3 : Bilan -->
    <div id="panel-results" class="step-panel">
        <div class="result-box">
            <h2>Résultats de la séance</h2>
            <p><strong>Élève :</strong> <span id="res-name">...</span></p>
            <p><strong>Note :</strong> <span id="res-grade" style="font-size: 2.2em; color: #27ae60; font-weight: bold;">0 / 10</span></p>
        </div>

        <h3 style="margin-top:25px; color:#2c3e50; border-bottom:2px solid #bdc3c7; padding-bottom:5px;">Correction détaillée</h3>
        <table class="bilan">
            <thead>
                <tr>
                    <th>Type de question</th>
                    <th>Énoncé</th>
                    <th>Ta réponse</th>
                    <th>Correction</th>
                </tr>
            </thead>
            <tbody id="bilan-table-body">
            </tbody>
        </table>

        <button class="btn-start" style="margin-top: 30px;" onclick="location.reload()">Refaire une autre série de 10</button>
    </div>

    <script>
        let quizQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let studentName = "";
        
        // Gestion de la saisie utilisateur
        let isExponentMode = false;
        let currentBaseText = "";
        let currentExpText = "";

        const mathInputDiv = document.getElementById("math-input");

        // Écouteur de touches clavier physiques pour capturer proprement la saisie
        mathInputDiv.addEventListener("keydown", function(e) {
            e.preventDefault(); // On gère manuellement l'affichage
            
            if (e.key === "Backspace") {
                if (isExponentMode) {
                    if (currentExpText.length > 0) {
                        currentExpText = currentExpText.slice(0, -1);
                    } else {
                        isExponentMode = false;
                        document.getElementById("btn-exponent").classList.remove("active");
                    }
                } else {
                    if (currentBaseText.length > 0) {
                        currentBaseText = currentBaseText.slice(0, -1);
                    }
                }
            } else if (e.key === "," || e.key === ".") {
                if (!isExponentMode) currentBaseText += ",";
            } else if (!isNaN(e.key) && e.key !== " ") {
                if (isExponentMode) {
                    currentExpText += e.key;
                } else {
                    currentBaseText += e.key;
                }
            } else if (e.key === "-") {
                if (isExponentMode && currentExpText.length === 0) {
                    currentExpText += "-";
                }
            } else if (e.key === "Enter") {
                submitAnswer();
                return;
            }
            updateMathInputDisplay();
        });

        function toggleExponentMode() {
            isExponentMode = !isExponentMode;
            const btn = document.getElementById("btn-exponent");
            if (isExponentMode) {
                btn.classList.add("active");
            } else {
                btn.classList.remove("active");
            }
            mathInputDiv.focus();
        }

        function updateMathInputDisplay() {
            let html = currentBaseText;
            if (currentExpText.length > 0 || isExponentMode) {
                html += `<span class="sup-mode">${currentExpText || " "}</span>`;
            }
            mathInputDiv.innerHTML = html;
        }

        function resetMathInput() {
            isExponentMode = false;
            currentBaseText = "";
            currentExpText = "";
            document.getElementById("btn-exponent").classList.remove("active");
            mathInputDiv.innerHTML = "";
        }

        // Renvoie l'interprétation de la chaîne pour vérification (ex: "5^3" ou "25")
        function getUserRawAnswer() {
            let base = currentBaseText.trim().replace(/\s+/g, '');
            let exp = currentExpText.trim().replace(/\s+/g, '');
            if (exp.length > 0) {
                return `${base}^${exp}`;
            }
            return base;
        }

        function buildQuiz() {
            quizQuestions = [];
            
            const generators = [
                // 1. Mettre un nombre sous la forme a^n
                () => {
                    const pairs = [ {b: 2, e: 3, v: 8}, {b: 2, e: 4, v: 16}, {b: 3, e: 2, v: 9}, {b: 3, e: 3, v: 27}, {b: 5, e: 2, v: 25}, {b: 10, e: 3, v: 1000} ];
                    const p = pairs[Math.floor(Math.random() * pairs.length)];
                    return {
                        type: "Forme aⁿ",
                        consigne: `Écris le nombre suivant sous la forme d'une puissance de ${p.b} :`,
                        htmlContent: `${p.v}`,
                        check: (raw) => raw === `${p.b}^${p.e}`,
                        correctDisplay: `${p.b}<sup>${p.e}</sup>`
                    };
                },
                // 2. Somme de puissances
                () => {
                    const b1 = [2, 3, 5][Math.floor(Math.random() * 3)];
                    const b2 = [2, 4, 10][Math.floor(Math.random() * 3)];
                    const e1 = 2; 
                    const e2 = b2 === 2 ? 3 : 2; 
                    const val1 = Math.pow(b1, e1);
                    const val2 = Math.pow(b2, e2);
                    const exact = val1 + val2;
                    return {
                        type: "Somme de puissances",
                        consigne: "Calcule la valeur numérique globale (nombre entier) :",
                        htmlContent: `${b1}<sup>${e1}</sup> + ${b2}<sup>${e2}</sup>`,
                        check: (raw) => raw === exact.toString(),
                        correctDisplay: exact.toString()
                    };
                },
                // 3. Produit de puissances (En ligne)
                () => {
                    const base = [2, 3, 5, 10][Math.floor(Math.random() * 4)];
                    const e1 = Math.floor(Math.random() * 4 + 2);
                    const e2 = Math.floor(Math.random() * 4 + 2);
                    const totalExp = e1 + e2;
                    return {
                        type: "Produit de puissances",
                        consigne: `Simplifie sous la forme d'une seule puissance de ${base} :`,
                        htmlContent: `${base}<sup>${e1}</sup> × ${base}<sup>${e2}</sup>`,
                        check: (raw) => raw === `${base}^${totalExp}`,
                        correctDisplay: `${base}<sup>${totalExp}</sup>`
                    };
                },
                // 4. Quotient de puissances (En ligne avec le symbole ÷)
                () => {
                    const base = [2, 3, 7, 10][Math.floor(Math.random() * 4)];
                    const e2 = Math.floor(Math.random() * 3 + 2); 
                    const e1 = e2 + Math.floor(Math.random() * 3 + 2); 
                    const diffExp = e1 - e2;

                    return {
                        type: "Quotient de puissances",
                        consigne: `Simplifie sous la forme d'une seule puissance de ${base} :`,
                        htmlContent: `${base}<sup>${e1}</sup> ÷ ${base}<sup>${e2}</sup>`,
                        check: (raw) => raw === `${base}^${diffExp}`,
                        correctDisplay: `${base}<sup>${diffExp}</sup>`
                    };
                },
                // 5. Calcul d'un entier simple (rappel)
                () => {
                    const base = [2, 3, 4, 5][Math.floor(Math.random() * 4)];
                    const exp = base === 2 ? 4 : 3;
                    const exact = Math.pow(base, exp);
                    return {
                        type: "Puissance simple d'un entier",
                        consigne: "Calcule la valeur entière correspondante :",
                        htmlContent: `${base}<sup>${exp}</sup>`,
                        check: (raw) => raw === exact.toString(),
                        correctDisplay: exact.toString()
                    };
                },
                // 6. Puissance de 10 négative (rappel)
                () => {
                    const exp = Math.floor(Math.random() * 3 + 1); 
                    let exact = "0,";
                    for(let i = 0; i < exp - 1; i++) exact += "0";
                    exact += "1";
                    return {
                        type: "Puissance de 10 négative",
                        consigne: "Donne l'écriture décimale de ce nombre :",
                        htmlContent: `10<sup>-${exp}</sup>`,
                        check: (raw) => raw.replace('.', ',') === exact,
                        correctDisplay: exact
                    };
                }
            ];

            // Distribution équilibrée pour atteindre 10 questions
            let pool = [0, 0, 1, 1, 2, 2, 3, 3, 4, 5]; 
            pool = pool.sort(() => 0.5 - Math.random());

            for (let i = 0; i < 10; i++) {
                quizQuestions.push(generators[pool[i]]());
            }
        }

        function startTest() {
            const nameInput = document.getElementById("student-name").value.trim();
            if (nameInput === "") {
                alert("Veuillez entrer votre nom.");
                return;
            }
            studentName = nameInput;
            buildQuiz();
            showPanel("panel-quiz");
            loadQuestion();
        }

        function showPanel(panelId) {
            document.querySelectorAll('.step-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(panelId).classList.add('active');
        }

        function loadQuestion() {
            if (currentIndex >= 10) {
                endTest();
                return;
            }

            const q = quizQuestions[currentIndex];
            document.getElementById("current-q").innerText = currentIndex + 1;
            document.getElementById("q-consigne").innerText = q.consigne;
            document.getElementById("q-expression-container").innerHTML = q.htmlContent;
            
            resetMathInput();
            mathInputDiv.focus();
            
            const progress = (currentIndex / 10) * 100;
            document.getElementById("progress-fill").style.width = progress + "%";
        }

        function submitAnswer() {
            const q = quizQuestions[currentIndex];
            const rawAns = getUserRawAnswer();
            
            if (rawAns === "") {
                alert("Veuillez inscrire une réponse.");
                return;
            }

            // Sauvegarde de l'affichage HTML généré par l'élève pour le bilan
            q.savedAnsHTML = mathInputDiv.innerHTML || "Aucune réponse";
            const isCorrect = q.check(rawAns);

            if (isCorrect) {
                score++;
                q.isCorrect = true;
            } else {
                q.isCorrect = false;
            }

            currentIndex++;
            loadQuestion();
        }

        function skipQuestion() {
            const q = quizQuestions[currentIndex];
            q.isCorrect = false;
            q.savedAnsHTML = "<span style='color:gray;'>Passée</span>";
            currentIndex++;
            loadQuestion();
        }

        function endTest() {
            showPanel("panel-results");
            document.getElementById("res-name").innerText = studentName;
            document.getElementById("res-grade").innerText = `${score} / 10`;
            
            if (score >= 8) document.getElementById("res-grade").style.color = "#2ecc71";
            else if (score >= 5) document.getElementById("res-grade").style.color = "#e67e22";
            else document.getElementById("res-grade").style.color = "#e74c3c";

            const tableBody = document.getElementById("bilan-table-body");
            tableBody.innerHTML = ""; 

            quizQuestions.forEach(q => {
                const row = document.createElement("tr");
                row.className = q.isCorrect ? "row-correct" : "row-incorrect";

                row.innerHTML = `
                    <td><strong>${q.type}</strong></td>
                    <td style="font-size:1.2em; text-align:center;">${q.htmlContent}</td>
                    <td style="font-size:1.2em; text-align:center; font-weight:bold;">${q.savedAnsHTML}</td>
                    <td style="font-size:1.2em; text-align:center;">${q.isCorrect ? '<span class="badge badge-success">Juste !</span>' : q.correctDisplay}</td>
                `;
                tableBody.appendChild(row);
            });
        }
    </script>
</body>
</html>
