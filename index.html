<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiche d'Automatismes : Les Puissances</title>
    <style>
        :root {
            --primary: #3498db;
            --secondary: #2bc0e4;
            --success: #2ecc71;
            --dark: #2c3e50;
            --light: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
            color: var(--dark);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 650px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: var(--dark);
            margin-bottom: 5px;
            font-size: 24px;
        }

        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .progress-bar {
            height: 6px;
            background-color: #ecf0f1;
            border-radius: 3px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            width: 20%;
            transition: width 0.4s ease;
        }

        .exercise-card {
            display: none;
        }

        .exercise-card.active {
            display: block;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            color: white;
            margin-bottom: 15px;
        }

        .badge.easy { background-color: #2ecc71; }
        .badge.medium { background-color: #f39c12; }
        .badge.hard { background-color: #e74c3c; }

        .question-text {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #bdc3c7;
            border-radius: 6px;
            resize: vertical;
            font-family: inherit;
            box-sizing: border-box;
            font-size: 14px;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .actions {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
            font-size: 14px;
        }

        .btn-validate {
            background-color: var(--success);
            color: white;
        }

        .btn-validate:hover { background-color: #27ae60; }

        .btn-next {
            background-color: var(--primary);
            color: white;
        }

        .btn-next:hover { background-color: #2980b9; }

        .solution-box {
            display: none;
            background-color: #e8f8f5;
            border-left: 5px solid var(--success);
            padding: 15px;
            margin-top: 20px;
            border-radius: 0 8px 8px 0;
            font-size: 14px;
            line-height: 1.6;
        }

        .solution-box.visible {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .math-expr {
            font-family: 'Times New Roman', Times, serif;
            font-style: italic;
            font-size: 1.2em;
            padding: 0 2px;
        }

        .fraction {
            display: inline-block;
            vertical-align: middle;
            text-align: center;
            padding: 0 4px;
        }

        .fraction span {
            display: block;
        }

        .fraction .numerator {
            border-bottom: 1px solid var(--dark);
            padding-bottom: 2px;
        }

        .fraction .denominator {
            padding-top: 2px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Fiche d'Automatismes : Les Puissances</h1>
    <div class="subtitle">Chaque élève avance à son rythme sans pénalité s'il passe une question</div>
    
    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>

    <!-- EXERCICE 1 : ÉCRITURE DÉCIMALE -->
    <div class="exercise-card active" id="ex1">
        <span class="badge easy">Exercice 1 : Écriture décimale</span>
        <div class="question-text" id="ex1-text"></div>
        <textarea rows="2" placeholder="Saisissez votre réponse ou vos étapes de calcul..."></textarea>
        <div class="solution-box" id="ex1-solution"></div>
    </div>

    <!-- EXERCICE 2 : PUISSANCES NÉGATIVES -->
    <div class="exercise-card" id="ex2">
        <span class="badge easy">Exercice 2 : Inverses et fractions</span>
        <div class="question-text" id="ex2-text"></div>
        <textarea rows="2" placeholder="Saisissez votre réponse..."></textarea>
        <div class="solution-box" id="ex2-solution"></div>
    </div>

    <!-- EXERCICE 3 : PRODUIT DE PUISSANCES -->
    <div class="exercise-card" id="ex3">
        <span class="badge medium">Exercice 3 : Règle du produit</span>
        <div class="question-text" id="ex3-text"></div>
        <textarea rows="2" placeholder="Écrivez le résultat sous la forme d'une seule puissance..."></textarea>
        <div class="solution-box" id="ex3-solution"></div>
    </div>

    <!-- EXERCICE 4 : QUOTIENT DE PUISSANCES -->
    <div class="exercise-card" id="ex4">
        <span class="badge medium">Exercice 4 : Règle du quotient</span>
        <div class="question-text" id="ex4-text"></div>
        <textarea rows="2" placeholder="Écrivez le résultat sous la forme d'une seule puissance..."></textarea>
        <div class="solution-box" id="ex4-solution"></div>
    </div>

    <!-- EXERCICE 5 : ADDITIONS ET PRIORITÉS -->
    <div class="exercise-card" id="ex5">
        <span class="badge hard">Exercice 5 : Opérations combinées</span>
        <div class="question-text" id="ex5-text"></div>
        <textarea rows="2" placeholder="Calculez la valeur numérique finale..."></textarea>
        <div class="solution-box" id="ex5-solution"></div>
    </div>

    <!-- BOUTONS D'ACTION -->
    <div class="actions">
        <button class="btn-validate" onclick="validateExercise()">Valider / Voir Solution</button>
        <button class="btn-next" onclick="nextExercise()">Passer la question »</button>
    </div>
</div>

<script>
    let currentStep = 1;
    const totalSteps = 5;

    function getRandomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }
    function getRandomChoice(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    // ==========================================
    // EXERCICE 1 : Écriture décimale simple
    // ==========================================
    const base1 = getRandomChoice([2, 3, 4, 5, 10]);
    const exp1 = (base1 === 10) ? getRandomInt(3, 6) : getRandomInt(2, 4);
    const result1 = Math.pow(base1, exp1);
    
    document.getElementById('ex1-text').innerHTML = `Donnez l'écriture décimale (ou entière) du nombre suivant : <span class="math-expr">${base1}<sup>${exp1}</sup></span>.`;
    
    let detail1 = (base1 === 10) ? `1 suivi de ${exp1} zéros` : Array(exp1).fill(base1).join(" × ");
    document.getElementById('ex1-solution').innerHTML = `
        <strong>Solution :</strong><br>
        L'exposant indique le nombre de fois que la base est multipliée par elle-même.<br>
        Calcul : ${detail1} = <b>${result1}</b>.`;

    // ==========================================
    // EXERCICE 2 : Puissances négatives
    // ==========================================
    const base2 = getRandomChoice([2, 4, 5, 10]);
    const exp2 = (base2 === 10) ? getRandomInt(1, 3) : getRandomChoice([1, 2]);
    const denom2 = Math.pow(base2, exp2);
    const dec2 = (1 / denom2).toString().replace('.', ',');

    document.getElementById('ex2-text').innerHTML = `Écrivez sous forme d'une fraction, puis sous forme décimale le nombre suivant : <span class="math-expr">${base2}<sup>-${exp2}</sup></span>.`;
    document.getElementById('ex2-solution').innerHTML = `
        <strong>Solution :</strong><br>
        Une puissance à exposant négatif est l'inverse de la puissance positive correspondante.<br>
        Forme fractionnaire : <div class="fraction"><span class="numerator">1</span><span class="denominator"><span class="math-expr">${base2}<sup>${exp2}</sup></span></span></div> = <div class="fraction"><span class="numerator">1</span><span class="denominator">${denom2}</span></div><br>
        Forme décimale : <b>${dec2}</b>.`;

    // ==========================================
    // EXERCICE 3 : Opération - Produit (ex: 2³ × 2⁵)
    // ==========================================
    // Utilisation d'entiers de deux chiffres (11 à 15) pour varier la complexité visuelle sans bloquer le calcul d'exposants
    const base3 = getRandomChoice([2, 5, 7, 12, 15]); 
    const eA3 = getRandomInt(2, 5);
    const eB3 = getRandomInt(2, 6);
    const totalExp3 = eA3 + eB3;

    document.getElementById('ex3-text').innerHTML = `Écrivez le produit suivant sous la forme d'une seule puissance : <br><br><span class="math-expr">${base3}<sup>${eA3}</sup> × ${base3}<sup>${eB3}</sup></span>.`;
    document.getElementById('ex3-solution').innerHTML = `
        <strong>Solution :</strong><br>
        Règle : Pour multiplier deux puissances d'un même nombre, on conserve la base et on additionne les exposants.<br>
        Formule : <span class="math-expr">a<sup>n</sup> × a<sup>m</sup> = a<sup>n + m</sup></span><br>
        Calcul des exposants : ${eA3} + ${eB3} = ${totalExp3}<br>
        Résultat : <b><span class="math-expr">${base3}<sup>${totalExp3}</sup></span></b>.`;

    // ==========================================
    // EXERCICE 4 : Opération - Quotient (ex: 7⁴ ÷ 7⁸)
    // ==========================================
    const base4 = getRandomChoice([3, 6, 7, 11, 14]);
    const eA4 = getRandomInt(3, 6);
    const eB4 = getRandomInt(5, 9); // Souvent supérieur pour amener un exposant négatif intéressant
    const totalExp4 = eA4 - eB4;

    document.getElementById('ex4-text').innerHTML = `Écrivez le quotient suivant sous la forme d'une seule puissance : <br><br><div class="fraction"><span class="numerator"><span class="math-expr">${base4}<sup>${eA4}</sup></span></span><span class="denominator"><span class="math-expr">${base4}<sup>${eB4}</sup></span></span></div>.`;
    document.getElementById('ex4-solution').innerHTML = `
        <strong>Solution :</strong><br>
        Règle : Pour diviser deux puissances d'un même nombre, on conserve la base et on soustrait l'exposant du dénominateur à celui du numérateur.<br>
        Formule : <div class="fraction"><span class="numerator"><span class="math-expr">a<sup>n</sup></span></span><span class="denominator"><span class="math-expr">a<sup>m</sup></span></span></div> = <span class="math-expr">a<sup>n - m</sup></span><br>
        Calcul des exposants : ${eA4} - ${eB4} = ${totalExp4}<br>
        Résultat : <b><span class="math-expr">${base4}<sup>${totalExp4}</sup></span></b> (ce qui équivaut également à <div class="fraction"><span class="numerator">1</span><span class="denominator"><span class="math-expr">${base4}<sup>${Math.abs(totalExp4)}</sup></span></span></div>).`;

    // ==========================================
    // EXERCICE 5 : Additions et priorités complexes
    // ==========================================
    const base5A = getRandomChoice([2, 3, 5]);
    const exp5A = getRandomInt(2, 3);
    const nbrEntier = getRandomInt(10, 25); // Nombre entier pur à deux chiffres
    const base5B = 10;
    const exp5B = getRandomInt(2, 3);

    const val5A = Math.pow(base5A, exp5A);
    const val5B = Math.pow(base5B, exp5B);
    const finalResult5 = val5A + nbrEntier + val5B;

    document.getElementById('ex5-text').innerHTML = `Calculez la valeur numérique complète en respectant les priorités opératoires : <br><br><span class="math-expr">${base5A}<sup>${exp5A}</sup> + ${nbrEntier} + ${base5B}<sup>${exp5B}</sup></span>.`;
    document.getElementById('ex5-solution').innerHTML = `
        <strong>Solution :</strong><br>
        Règle : Les puissances sont prioritaires sur les additions.<br>
        Étape 1 : Calcul des puissances séparément :<br>
        • <span class="math-expr">${base5A}<sup>${exp5A}</sup></span> = ${val5A}<br>
        • <span class="math-expr">${base5B}<sup>${exp5B}</sup></span> = ${val5B}<br>
        Étape 2 : Remplacement et somme totale :<br>
        ${val5A} + ${nbrEntier} + ${val5B} = <b>${finalResult5}</b>.`;


    // ==========================================
    // LOGIQUE DE NAVIGATION SANS PÉNALITÉ
    // ==========================================
    function updateProgressBar() {
        document.getElementById('progress').style.width = (currentStep / totalSteps) * 100 + '%';
    }

    function validateExercise() {
        const activeCard = document.querySelector('.exercise-card.active');
        activeCard.querySelector('.solution-box').classList.add('visible');
    }

    function nextExercise() {
        const currentCard = document.getElementById(`ex${currentStep}`);
        if (currentStep < totalSteps) {
            currentCard.classList.remove('active');
            currentStep++;
            document.getElementById(`ex${currentStep}`).classList.add('active');
            updateProgressBar();
        } else {
            alert("Série terminée ! La page va se recharger pour générer de nouvelles opérations.");
            window.location.reload();
        }
    }

    updateProgressBar();
</script>

</body>
</html>
