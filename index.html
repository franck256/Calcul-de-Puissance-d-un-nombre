<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiche d'Automatismes : Puissances & Enchaînements</title>
<style>
:root {
--primary: #3498db;
--secondary: #2bc0e4;
--success: #2ecc71;
--dark: #2c3e50;
--light: #f8f9fa;
}
body {
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
background: linear-gradient(135deg, #e0eafc, #cfdef3);
color: var(--dark);
margin: 0;
padding: 20px;
display: flex;
justify-content: center;
align-items: center;
min-height: 100vh;
}
.container {
background: white;
padding: 30px;
border-radius: 15px;
box-shadow: 0 10px 25px rgba(0,0,0,0.1);
max-width: 650px;
width: 100%;
}
h1 {
text-align: center;
color: var(--dark);
margin-bottom: 5px;
font-size: 24px;
}
.subtitle {
text-align: center;
color: #7f8c8d;
margin-bottom: 25px;
font-size: 14px;
}
.user-info {
background: #edf2f7;
padding: 15px;
border-radius: 8px;
margin-bottom: 20px;
display: flex;
align-items: center;
gap: 10px;
}
.user-info label {
font-weight: bold;
font-size: 14px;
}
.user-info input {
flex: 1;
padding: 8px 12px;
border: 1px solid #cbd5e1;
border-radius: 6px;
font-size: 14px;
}
.progress-bar {
height: 6px;
background-color: #ecf0f1;
border-radius: 3px;
margin-bottom: 25px;
overflow: hidden;
}
.progress {
height: 100%;
background: linear-gradient(to right, var(--primary), var(--secondary));
width: 25%;
transition: width 0.4s ease;
}
.exercise-card {
display: none;
}
.exercise-card.active {
display: block;
}
.badge {
display: inline-block;
padding: 4px 10px;
border-radius: 20px;
font-size: 12px;
font-weight: bold;
color: white;
margin-bottom: 15px;
background-color: var(--primary);
}
.question-text {
font-size: 16px;
font-weight: 600;
margin-bottom: 15px;
line-height: 2;
}
textarea {
width: 100%;
padding: 12px;
border: 1px solid #bdc3c7;
border-radius: 6px;
resize: vertical;
font-family: inherit;
box-sizing: border-box;
font-size: 14px;
}
.actions {
display: flex;
justify-content: space-between;
margin-top: 25px;
}
button {
padding: 12px 25px;
border: none;
border-radius: 6px;
cursor: pointer;
font-weight: bold;
font-size: 14px;
}
.btn-validate { background-color: var(--success); color: white; }
.btn-next { background-color: var(--primary); color: white; }
.solution-box {
display: none;
background-color: #e8f8f5;
border-left: 5px solid var(--success);
padding: 15px;
margin-top: 20px;
border-radius: 0 8px 8px 0;
font-size: 14px;
line-height: 1.6;
}
.solution-box.visible {
display: block;
}
.math-expr {
font-family: 'Times New Roman', Times, serif;
font-style: italic;
font-size: 1.35em;
display: inline-flex;
align-items: center;
justify-content: center;
vertical-align: middle;
line-height: 1;
}
sup {
font-size: 0.7em;
line-height: 1;
margin-left: 1px;
vertical-align: super;
}
.fraction {
display: inline-flex;
flex-direction: column;
align-items: center;
justify-content: center;
vertical-align: middle;
padding: 0 4px;
}
.numerator {
border-bottom: 1.5px solid var(--dark);
padding-bottom: 1px;
text-align: center;
width: 100%;
}
.denominator {
padding-top: 1px;
text-align: center;
width: 100%;
}
.parentheses {
font-size: 1.4em;
font-weight: 300;
font-style: normal;
vertical-align: middle;
line-height: 1;
}
</style>
</head>
<body>
<div class="container">
<h1>Fiche d'Automatismes : Puissances & Enchaînements</h1>
<div class="subtitle">Progression libre et sans pénalité en cas d'abandon de question</div>
<div class="user-info">
<label for="student-name">Élève (Nom & Prénom) :</label>
<input type="text" id="student-name" placeholder="Ex: Lucas Martin">
</div>
<div class="progress-bar">
<div class="progress" id="progress"></div>
</div>
<div class="exercise-card active" id="ex1">
<span class="badge">Exercice 1 : Règle du produit</span>
<div class="question-text" id="ex1-text"></div>
<textarea rows="2" placeholder="Écrivez sous la forme d'une seule puissance..."></textarea>
<div class="solution-box" id="ex1-solution"></div>
</div>
<div class="exercise-card" id="ex2">
<span class="badge">Exercice 2 : Règle du quotient</span>
<div class="question-text" id="ex2-text"></div>
<textarea rows="2" placeholder="Écrivez sous la forme d'une seule puissance..."></textarea>
<div class="solution-box" id="ex2-solution"></div>
</div>
<div class="exercise-card" id="ex3">
<span class="badge">Exercice 3 : Structure type J du document</span>
<div class="question-text" id="ex3-text"></div>
<textarea rows="2" placeholder="Calculez et simplifiez la fraction au maximum..."></textarea>
<div class="solution-box" id="ex3-solution"></div>
</div>
<div class="exercise-card" id="ex4">
<span class="badge">Exercice 4 : Opération combinée type L</span>
<div class="question-text" id="ex4-text"></div>
<textarea rows="2" placeholder="Calculez et donnez la fraction irréductible..."></textarea>
<div class="solution-box" id="ex4-solution"></div>
</div>
<div class="actions">
<button class="btn-validate" onclick="validateExercise()">Valider / Voir Solution</button>
<button class="btn-next" onclick="nextExercise()">Passer la question »</button>
</div>
</div>
<script>
let currentStep = 1;
const totalSteps = 4;
function gcd(a, b) {
return b ? gcd(b, a % b) : Math.abs(a);
}
function getRandomInt(min, max) {
return Math.floor(Math.random() * (max - min + 1)) + min;
}
function getRandomChoice(arr) {
return arr[Math.floor(Math.random() * arr.length)];
}
const b1 = getRandomChoice([11, 12, 14, 15, 17]);
const e1A = getRandomInt(2, 5);
const e1B = getRandomInt(2, 6);
document.getElementById('ex1-text').innerHTML = "Écrivez l'expression suivante sous la forme d'une seule puissance de " + b1 + " :

 <span class="math-expr">" + b1 + "<sup>" + e1A + "</sup> × " + b1 + "<sup>" + e1B + "</sup></span>";
document.getElementById('ex1-solution').innerHTML = "<strong>Correction :</strong> On conserve la base et on additionne les exposants : " + e1A + " + " + e1B + " = " + (e1A+e1B) + ".
Résultat : <b><span class="math-expr">" + b1 + "<sup>" + (e1A+e1B) + "</sup></span></b>.";
const b2 = getRandomChoice([11, 13, 15, 16, 18]);
const e2A = getRandomInt(2, 5);
const e2B = getRandomInt(6, 9);
document.getElementById('ex2-text').innerHTML = "Écrivez sous la forme d'une seule puissance de " + b2 + " :

 <span class="math-expr"><div class="fraction"><span class="numerator">" + b2 + "<sup>" + e2A + "</sup></span><span class="denominator">" + b2 + "<sup>" + e2B + "</sup></span></div></span>";
document.getElementById('ex2-solution').innerHTML = "<strong>Correction :</strong> On soustrait l'exposant du dénominateur : " + e2A + " - " + e2B + " = " + (e2A-e2B) + ".
Résultat : <b><span class="math-expr">" + b2 + "<sup>" + (e2A-e2B) + "</sup></span></b>.";
const nJ = getRandomInt(4, 9);
const numJ = 1 - (nJ * nJ);
const denJ = Math.pow(1 - nJ, 2);
const divJ = gcd(numJ, denJ);
let fNum = numJ / divJ;
let fDen = denJ / divJ;
let sign = "";
if (fNum < 0 && fDen > 0) { sign = "-"; fNum = Math.abs(fNum); }
let resVisual = (fDen === 1) ? "" + sign + fNum : sign + "<div class="fraction"><span class="numerator">" + fNum + "</span><span class="denominator">" + fDen + "</span></div>";
document.getElementById('ex3-text').innerHTML = "Calculez et simplifiez (comme l'exercice 14-J du document) :

 <span class="math-expr">J = <div class="fraction"><span class="numerator">1 - " + nJ + "<sup>2</sup></span><span class="denominator"><span class="parentheses">(</span>1 - " + nJ + "<span class="parentheses">)</span><sup>2</sup></span></div></span>";
document.getElementById('ex3-solution').innerHTML = "<strong>Correction :</strong>
• Numérateur : 1 - " + (nJ * nJ) + " = " + numJ + "
• Dénominateur : (1 - " + nJ + ")<sup>2</sup> = (-" + (nJ-1) + ")<sup>2</sup> = " + denJ + "
• Fraction : <span class="math-expr"><div class="fraction"><span class="numerator">" + numJ + "</span><span class="denominator">" + denJ + "</span></div></span> = <b><span class="math-expr">" + resVisual + "</span></b>.";
const entL = getRandomInt(2, 3);
const n4Num = -1 * (1 + entL * 6);
const divL = gcd(n4Num, 24);
const finalN4 = n4Num / divL;
const finalD4 = 24 / divL;
let signL = (finalN4 < 0) ? "-" : "";
document.getElementById('ex4-text').innerHTML = "Calculez et simplifiez au maximum (comme l'exercice 14-L du document) :

 <span class="math-expr">L = <span class="parentheses">(</span><div class="fraction"><span class="numerator">1</span><span class="denominator">4</span></div> - <div class="fraction"><span class="numerator">3</span><span class="denominator">8</span></div><span class="parentheses">)</span> × <span class="parentheses">(</span><div class="fraction"><span class="numerator">1</span><span class="denominator">6</span></div> + " + entL + "<span class="parentheses">)</span></span>";
document.getElementById('ex4-solution').innerHTML = "<strong>Correction :</strong>
• Parenthèse 1 : <span class="math-expr"><div class="fraction"><span class="numerator">2</span><span class="denominator">8</span></div> - <div class="fraction"><span class="numerator">3</span><span class="denominator">8</span></div> = <div class="fraction"><span class="numerator">-1</span><span class="denominator">8</span></div></span>
• Parenthèse 2 : <span class="math-expr"><div class="fraction"><span class="numerator">1</span><span class="denominator">6</span></div> + <div class="fraction"><span class="numerator\">" + (entL*6) + "</span><span class="denominator">6</span></div> = <div class="fraction"><span class="numerator\">" + (1+entL*6) + "</span><span class="denominator">6</span></div></span>
• Produit : <span class="math-expr"><div class="fraction"><span class="numerator">-1</span><span class="denominator">8</span></div> × <div class="fraction"><span class="numerator">" + (1+entL*6) + "</span><span class="denominator">6</span></div> = <div class="fraction"><span class="numerator">" + n4Num + "</span><span class="denominator">48</span></div></span> = <b><span class="math-expr">" + signL + " <div class="fraction"><span class="numerator">" + Math.abs(finalN4) + "</span><span class="denominator">" + finalD4 + "</span></div></span></b>.";
function updateProgressBar() {
document.getElementById('progress').style.width = (currentStep / totalSteps) * 100 + '%';
}
function validateExercise() {
document.querySelector('.exercise-card.active .solution-box').classList.add('visible');
}
function nextExercise() {
const currentCard = document.getElementById('ex' + currentStep);
if (currentStep < totalSteps) {
currentCard.classList.remove('active');
currentStep++;
document.getElementById('ex' + currentStep).classList.add('active');
updateProgressBar();
} else {
const student = document.getElementById('student-name').value || "L'élève";
alert("Série validée avec succès par " + student + " !");
window.location.reload();
}
}
updateProgressBar();
</script>
</body>
</html>
