<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Fractions</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f7fb;
            color: #2c3e50;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 650px;
            width: 100%;
        }

        .box-question {
            background-color: #ebf3fc;
            border-radius: 12px;
            padding: 40px 20px;
            margin-bottom: 20px;
        }

        .box-correction {
            background-color: #ffebeb;
            border-radius: 12px;
            padding: 25px 20px;
            border-left: 5px solid #e74c3c;
        }

        /* FLEXBOX UNIFIÉ POUR SAFARI : Aligne parfaitement au centre horizontal du signe "=" */
        .math-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-family: 'Times New Roman', Times, serif;
            font-style: italic;
            font-size: 1.6em;
            margin: 20px 0;
        }

        .text-explanation {
            font-family: sans-serif;
            font-style: normal;
            font-size: 16px;
        }

        .fraction {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
        }

        /* Barre principale épaissie pour la distinguer des fractions internes */
        .main-fraction > .numerator {
            border-bottom: 3px solid #2c3e50;
            padding-bottom: 6px;
        }
        
        .main-fraction > .denominator {
            padding-top: 6px;
        }

        .numerator {
            border-bottom: 2px solid #2c3e50;
            padding-bottom: 4px;
            text-align: center;
            width: 100%;
        }

        .denominator {
            padding-top: 4px;
            text-align: center;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <!-- ÉNONCÉ CORRIGÉ -->
    <div class="box-question">
        <div class="math-row">
            <!-- La fraction principale -->
            <div class="fraction main-fraction">
                <div class="numerator">
                    <div class="fraction">
                        <div class="numerator">4</div>
                        <div class="denominator">9</div>
                    </div>
                </div>
                <div class="denominator">
                    <div class="fraction">
                        <div class="numerator">5</div>
                        <div class="denominator">5</div>
                    </div>
                </div>
            </div>
            <!-- Le signe égale reste ancré au centre de la barre principale -->
            <span>= ?</span>
        </div>
    </div>

    <!-- CORRECTION -->
    <div class="box-correction">
        <div class="math-row">
            <span class="text-explanation">Réponse attendue : </span>
            <div class="fraction">
                <div class="numerator">100</div>
                <div class="denominator">9</div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
