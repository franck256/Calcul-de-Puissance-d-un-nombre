<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Fiche d'Automatismes : Puissances & Fractions</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #cfdef3; color: #2c3e50; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 15px; max-width: 650px; width: 100%; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .user-info { background: #edf2f7; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 10px; align-items: center; }
        .user-info input { flex: 1; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; }
        .progress-bar { height: 6px; background: #ecf0f1; border-radius: 3px; margin-bottom: 25px; overflow: hidden; }
        .progress { height: 100%; background: #3498db; width: 20%; transition: width 0.4s; }
        .exercise-card { display: none; background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .exercise-card.active { display: block; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; color: white; margin-bottom: 15px; background: #f39c12; }
        .question-text { font-size: 16px; font-weight: 600; margin-bottom: 15px; line-height: 1.8; }
        textarea { width: 100%; padding: 12px; border: 1px solid #bdc3c7; border-radius: 6px; box-sizing: border-box; }
        .actions { display: flex; justify-content: space-between; margin-top: 25px; }
        button { padding: 12px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-validate { background: #2ecc71; color: white; }
        .btn-next { background: #3498db; color: white; }
        .solution-box { display: none; background: #e8f8f5; border-left: 5px solid #2ecc71; padding: 15px; margin-top: 20px; }
        .solution-box.visible { display: block; }
        .math-expr { font-family: 'Times New Roman', serif; font-style: italic; font-size: 1.3em; display: inline-flex; align-items: center; vertical-align: middle; }
        sup { font-size: 0.75em; }
        .fraction { display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; padding: 0 4px; }
        .numerator { border-bottom: 1.5px solid #2c3e50; padding-bottom: 2px; text-align: center; }
        .denominator { padding-top: 2px; text-align: center; }
        .parentheses { font-size: 1.6em; font-style: normal; vertical-align: middle; line-height: 0.9; }
    </style>
</head>
<body>
<div class="container">
    <h1>Fiche d'Automatismes</h1>
    <div class="user-info">
        <label>Élève (Nom & Prénom) :</label>
        <input type="text" id="student-name" placeholder="Ex: Jean Dupont">
    </div>
    <div class="progress-bar"><div class="progress" id="progress"></div></div>

    <div class="exercise-card active" id="ex1">
        <span class="badge">Exercice 1 : Produit de puissances</span>
        <div class="question-text" id="ex1-text"></div>
        <textarea rows="2" placeholder="Votre réponse..."></textarea>
        <div class="solution-box" id="ex1-solution"></div>
    </div>
    <div class="exercise-card" id="ex2">
        <span class="badge">Exercice 2 : Quotient de puissances</span>
        <div class="question-text" id="ex2-text"></div>
        <textarea rows="2" placeholder="Votre réponse..."></textarea>
        <div class="solution-box" id="ex2-solution"></div>
    </div>
    <div class="exercise-card" id="ex3">
        <span class="badge">Exercice 3 : Structure complexe (Type J)</span>
        <div class="question-text" id="ex3-text"></div>
        <textarea rows="2" placeholder="Votre réponse..."></textarea>
        <div class="solution-box" id="ex3-solution"></div>
    </div>
    <div class="exercise-card" id="ex4">
        <span class="badge">Exercice 4 : Parenthèses (Type L)</span>
        <div class="question-text" id="ex4-text"></div>
        <textarea rows="2" placeholder="Votre réponse..."></textarea>
        <div class="solution-box" id="ex4-solution"></div>
    </div>
    <div class="exercise-card" id="ex5">
        <span class="badge">Exercice 5 : Superposition (Type G/N)</span>
        <div class="question-text" id="ex5-text"></div>
        <textarea rows="2" placeholder="Votre réponse..."></textarea>
        <div class="solution-box" id="ex5-solution"></div>
    </div>

    <div class="actions">
        <button class="btn-validate" onclick="validateExercise()">Valider / Voir Solution</button>
        <button class="btn-next" onclick="nextExercise()">Passer la question »</button>
    </div>
</div>
<!-- COUPEZ ICI POUR LE SCRIPT SOUHAITÉ -->
</body>
</html>
